  fact_relationship:
    description: The FACT_RELATIONSHIP table contains records about the relationships
      between facts stored as records in any table of the CDM. Relationships can be
      defined between facts from the same domain, or different domains. Examples of
      Fact Relationships include - Person relationships (parent-child), care site
      relationships (hierarchical organizational structure of facilities within a
      health system), indication relationship (between drug exposures and associated
      conditions), usage relationships (of devices during the course of an associated
      procedure), or facts derived from one another (measurements derived from an
      associated specimen).
    attributes:
      domain_concept_id_1:
        description: The concept representing the domain of fact one, from which the
          corresponding table can be inferred.
        imported_from: domain_concept_id_1
        range: integer
        domain: concept
        identifier: false
        required: true
      fact_id_1:
        description: The unique identifier in the table corresponding to the domain
          of fact one.
        imported_from: fact_id_1
        range: integer
        identifier: false
        required: true
      domain_concept_id_2:
        description: The concept representing the domain of fact two, from which the
          corresponding table can be inferred.
        imported_from: domain_concept_id_2
        range: integer
        domain: concept
        identifier: false
        required: true
      fact_id_2:
        description: The unique identifier in the table corresponding to the domain
          of fact two.
        imported_from: fact_id_2
        range: integer
        identifier: false
        required: true
      relationship_concept_id:
        description: A foreign key that refers to an identifier in the CONCEPT table
          for the unique relationship concept.
        imported_from: relationship_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true   
  location:
    description: The LOCATION table represents a generic way to capture physical location
      or address information of Persons and Care Sites.
    attributes:
      location_id:
        description: A foreign key to the place of residency for the person in the
          location table, where the detailed address information is stored.
        imported_from: location_id
