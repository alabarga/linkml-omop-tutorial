        imported_from: unit_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
  measurement:
    description: The MEASUREMENT table contains records of Measurement, i.e. structured
      values (numerical or categorical) obtained through systematic and standardized
      examination or testing of a Person or Person''s sample. The MEASUREMENT table
      contains both orders and results of such Measurements as laboratory tests, vital
      signs, quantitative findings from pathology reports, etc.
    attributes:
      measurement_id:
        description: A unique identifier for each Measurement.
        imported_from: measurement_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      measurement_concept_id:
        description: A foreign key to the standard measurement concept identifier
          in the Standardized Vocabularies. These belong to the ''Measurement'' domain,
          but could overlap with the ''Observation'' domain (see
        imported_from: measurement_concept_id
        range: integer
        bindings:
          - range: omop_measurement_values
