        imported_from: note_event_id
        range: integer
        identifier: false
        required: false
      note_event_field_concept_id:
        description: A foreign key to the predefined Concept in the Standardized Vocabularies
          reflecting the field to which the note_event_id is referring.
        imported_from: note_event_field_concept_id
        range: integer # There are no accepted terms
        domain: concept
        identifier: false
        required: false
  note_nlp:
    description: The NOTE_NLP table will encode all output of NLP on clinical notes.
      Each row represents a single extracted term from a note.
    attributes:
      note_nlp_id:
        description: A unique identifier for each term extracted from a note.
        imported_from: note_nlp_id
        range: integer
        identifier: true
        required: true
      note_id:
        description: A foreign key to the Note table note the term was
        imported_from: note_id
        range: integer
        identifier: false
        required: true
      section_concept_id:
        description: A foreign key to the predefined Concept in the Standardized Vocabularies
          representing the section of the extracted term.
        imported_from: section_concept_id
        range: integer # concepts with the relationship ‘Subsumes’ to CONCEPT_ID 45875957.
        domain: concept
        identifier: false
        required: false
      snippet:
        description: A small window of text surrounding the term.
        imported_from: snippet
        range: string
        identifier: false
        required: false
      lexical_variant:
        description: Raw text extracted from the NLP tool.
        imported_from: lexical_variant
        range: string
        identifier: false
        required: true
      note_nlp_concept_id:
        description: A foreign key to the predefined Concept in the Standardized Vocabularies
          reflecting the normalized concept for the extracted term. Domain of the
          term is represented as part of the Concept table.
        imported_from: note_nlp_concept_id
        range: integer # No accepted terms
        domain: concept
        identifier: false
        required: false
      note_nlp_source_concept_id:
        description: A foreign key to a Concept that refers to the code in the source
          vocabulary used by the NLP system
        imported_from: note_nlp_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      nlp_system:
        description: Name and version of the NLP system that extracted the term.Useful
          for data provenance.
        imported_from: nlp_system
        range: string
        identifier: false
        required: false
      nlp_date:
        description: The date of the note processing.Useful for data provenance.
        imported_from: nlp_date
        range: date
        identifier: false
        required: true
      nlp_datetime:
        description: The date and time of the note processing. Useful for data provenance.
        imported_from: nlp_datetime
        range: datetime
        identifier: false
        required: false
      term_exists:
        description: A summary modifier that signifies presence or absence of the
          term for a given patient. Useful for quick querying.
        imported_from: term_exists
        range: string
        identifier: false
        required: false
      term_temporal:
        description: "Term_temporal is to indicate if a condition is present or just in the past."
        imported_from: term_temporal
        range: string
        identifier: false
        required: false 
      term_modifiers:
        description: "For the modifiers that are there, they would have to have these values: \
          \ - Negation = false - Subject = patient - Conditional = false - Rule_out = false \
          \ - Uncertain = true or high or moderate or even low (could argue about low). \
          \ Term_modifiers will concatenate all modifiers for different types of entities \
          \ (conditions, drugs, labs etc) into one string. Lab values will be saved as one \ 
          \ of the modifiers."
        imported_from: term_modifiers
        range: string
        identifier: false
        required: false
  specimen:
