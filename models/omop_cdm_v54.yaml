        identifier: false
        required: false 
      unit_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies for the unit concept.
        imported_from: unit_concept_id
        range: integer # There are no accepted terms --> UCUM?
        domain: concept
        identifier: false
        required: false
      range_low:
        description: The lower limit of the normal range of the Measurement result.
          The lower range is assumed to be of the same unit of measure as the Measurement
          value.
        imported_from: range_low
        range: float
        identifier: false
        required: false
      range_high:
        description: The upper limit of the normal range of the Measurement. The upper
          range is assumed to be of the same unit of measure as the Measurement value.
