        required: false     
  payer_plan_period:
    description: The PAYER_PLAN_PERIOD table captures details of the period of time
      that a Person is continuously enrolled under a specific health Plan benefit
      structure from a given Payer. Each Person receiving healthcare is typically
      covered by a health benefit plan, which pays for (fully or partially), or directly
      provides, the care. These benefit plans are provided by payers, such as health
      insurances or state or government agencies. In each plan the details of the
      health benefits are defined for the Person or her family, and the health benefit
      Plan might change over time typically with increasing utilization (reaching
      certain cost thresholds such as deductibles), plan availability and purchasing
      choices of the Person. The unique combinations of Payer organizations, health
      benefit Plans and time periods in which they are valid for a Person are recorded
      in this table.
    attributes:
      payer_plan_period_id:
        description: A foreign key to the PAYER_PLAN_PERIOD table, where the details
          of the Payer, Plan and Family are stored. Record the payer_plan_id that
          relates to the payer who contributed to the paid_by_payer field.
        imported_from: payer_plan_period_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      payer_plan_period_start_date:
        description: The start date of the payer plan period.
        imported_from: payer_plan_period_start_date
        range: date
        identifier: false
        required: true
      payer_plan_period_end_date:
        description: The end date of the payer plan period.
        imported_from: payer_plan_period_end_date
        range: date
        identifier: false
        required: true
      payer_concept_id:
        description: A foreign key that refers to a standard Payer concept identifier
          in the Standarized Vocabularies
        imported_from: payer_concept_id
        range: omop_payer_values # It is a domain
        domain: concept
        identifier: false
        required: false
      payer_source_value:
        description: The source code for the payer as it appears in the source data.
        imported_from: payer_source_value
        range: string
        identifier: false
        required: false
      payer_source_concept_id:
        description: A foreign key to a payer concept that refers to the code used
          in the source.
        imported_from: payer_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      plan_concept_id:
        description: A foreign key that refers to a standard plan concept identifier
          that represents the health benefit plan in the Standardized Vocabularies.
        imported_from: plan_concept_id
        range: integer
        bindings:
          - range: omop_plan_values
        domain: concept
        identifier: false
        required: false
      plan_source_value:
        description: The source code for the Person''s health benefit plan as it appears
          in the source data.
        imported_from: plan_source_value
        range: string
        identifier: false
        required: false
      plan_source_concept_id:
        description: A foreign key to a plan concept that refers to the plan code
          used in the source data.
        imported_from: plan_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      sponsor_concept_id:
        description: A foreign key that refers to a concept identifier that represents
          the sponsor in the Standardized Vocabularies.
        imported_from: sponsor_concept_id
        range: integer # There are no accepted terms
        domain: concept
        identifier: false
        required: false
      sponsor_source_value:
        description: The source code for the Person''s sponsor of the health plan
          as it appears in the source data.
        imported_from: sponsor_source_value
        range: string
        identifier: false
        required: false
      sponsor_source_concept_id:
        description: A foreign key to a sponsor concept that refers to the sponsor
          code used in the source data.
        imported_from: sponsor_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      family_source_value:
        description: The source code for the Person''s family as it appears in the
          source data.
        imported_from: family_source_value
        range: string
        identifier: false
        required: false
      stop_reason_concept_id:
        description: A foreign key that refers to a standard termination reason that
          represents the reason for the termination in the Standardized Vocabularies.
        imported_from: stop_reason_concept_id
        range: integer
        bindings:
          - range: omop_plan_stop_reason_values
        domain: concept
        identifier: false
        required: false
      stop_reason_source_value:
        description: The reason for stop-coverage as it appears in the source data.
        imported_from: stop_reason_source_value
        range: string
        identifier: false
        required: false
      stop_reason_source_concept_id:
        description: A foreign key to a stop-coverage concept that refers to the code
          used in the source.
        imported_from: stop_reason_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
  cost:
    description: The COST table captures records containing the cost of any medical
      event recorded in one of the OMOP clinical event tables such as DRUG_EXPOSURE,
      PROCEDURE_OCCURRENCE, VISIT_OCCURRENCE, VISIT_DETAIL, DEVICE_OCCURRENCE, OBSERVATION
      or MEASUREMENT. Each record in the cost table account for the amount of money
      transacted for the clinical event. So, the COST table may be used to represent
      both receivables (charges) and payments (paid), each transaction type represented
      by its COST_CONCEPT_ID. The COST_TYPE_CONCEPT_ID field will use concepts in
      the Standardized Vocabularies to designate the source (provenance) of the cost
      data. A reference to the health plan information in the PAYER_PLAN_PERIOD table
      is stored in the record for information used for the adjudication system to
      determine the persons benefit for the clinical event.
    attributes:
      cost_id:
        description: A unique identifier for each COST record.
        imported_from: cost_id
        range: integer
        identifier: true
        required: true
      cost_event_id:
        description: A foreign key identifier to the event (e.g. Measurement, Procedure,
          Visit, Drug Exposure, etc) record for which cost data are recorded.
        imported_from: cost_event_id
        range: integer
        identifier: false
        required: true
      cost_domain_id:
        description: The concept representing the domain of the cost event, from which
          the corresponding table can be inferred that contains the entity for which
          cost information is recorded.
        imported_from: cost_domain_id
        range: string
        domain: domain
        identifier: false
        required: true
      cost_type_concept_id:
        description: A foreign key identifier to a concept in the CONCEPT table for
          the provenance or the source of the COST data and belonging to the ''Cost
          Type'' vocabulary
        imported_from: cost_type_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true
      currency_concept_id:
        description: A foreign key identifier to the concept representing the 3-letter
          code used to delineate international currencies, such as USD for US Dollar.
          These belong to the ''Currency'' vocabulary
        imported_from: currency_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      total_charge:
        description: The total amount charged by some provider of goods or services
          (e.g. hospital, physician pharmacy, dme provider) to payers (insurance companies,
          the patient).
        imported_from: total_charge
        range: float
        identifier: false
        required: false
      total_cost:
        description: The cost incurred by the provider of goods or services.
        imported_from: total_cost
        range: float
        identifier: false
        required: false
      total_paid:
        description: The total amount actually paid from all payers for goods or services
          of the provider.
        imported_from: total_paid
        range: float
        identifier: false
        required: false
      paid_by_payer:
        description: The amount paid by the Payer for the goods or services.
        imported_from: paid_by_payer
        range: float
        identifier: false
        required: false
      paid_by_patient:
        description: The total amount paid by the Person as a share of the expenses.
        imported_from: paid_by_patient
        range: float
        identifier: false
        required: false
      paid_patient_copay:
        description: The amount paid by the Person as a fixed contribution to the
          expenses.
        imported_from: paid_patient_copay
        range: float
        identifier: false
        required: false
      paid_patient_coinsurance:
        description: The amount paid by the Person as a joint assumption of risk.
          Typically, this is a percentage of the expenses defined by the Payer Plan
          after the Person's deductible is exceeded.
        imported_from: paid_patient_coinsurance
        range: float
        identifier: false
        required: false
      paid_patient_deductible:
        description: The amount paid by the Person that is counted toward the deductible
          defined by the Payer Plan. paid_patient_deductible does contribute to the
          paid_by_patient variable.
        imported_from: paid_patient_deductible
        range: float
        identifier: false
        required: false
      paid_by_primary:
        description: The amount paid by a primary Payer through the coordination of
          benefits.
        imported_from: paid_by_primary
        range: float
        identifier: false
        required: false
      paid_ingredient_cost:
        description: The amount paid by the Payer to a pharmacy for the drug, excluding
          the amount paid for dispensing the drug. paid_ingredient_cost contributes
          to the paid_by_payer field if this field is populated with a nonzero value.
        imported_from: paid_ingredient_cost
        range: float
        identifier: false
        required: false
      paid_dispensing_fee:
        description: The amount paid by the Payer to a pharmacy for dispensing a drug,
          excluding the amount paid for the drug ingredient. paid_dispensing_fee contributes
          to the paid_by_payer field if this field is populated with a nonzero value.
        imported_from: paid_dispensing_fee
        range: float
        identifier: false
        required: false
      payer_plan_period_id:
        description: A foreign key to the PAYER_PLAN_PERIOD table, where the details
          of the Payer, Plan and Family are stored. Record the payer_plan_id that
          relates to the payer who contributed to the paid_by_payer field.
        imported_from: payer_plan_period_id
        range: integer
        identifier: false
        required: false
      amount_allowed:
        description: The contracted amount agreed between the payer and provider.
        imported_from: amount_allowed
        range: float
        identifier: false
        required: false
      revenue_code_concept_id:
        description: A foreign key referring to a Standard Concept ID in the Standardized
          Vocabularies for Revenue codes belonging to the ''Revenue Code'' vocabulary.
        imported_from: revenue_code_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      revenue_code_source_value:
        description: The source value for the Revenue code as it appears in the source
          data, stored here for reference.
        imported_from: revenue_code_source_value
        range: string
        identifier: false
        required: false
      drg_concept_id:
        description: A foreign key referring to a Standard Concept ID in the Standardized
          Vocabularies for DRG codes belonging to the ''DRG'' vocabulary.
        imported_from: drg_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      drg_source_value:
        description: The source value for the 3-digit DRG source code as it appears
          in the source data, stored here for reference.
        imported_from: drg_source_value
        range: string
        identifier: false
        required: false
  drug_era:
    description: 'A Drug Era is defined as a span of time when the Person is assumed
      to be exposed to a particular active ingredient. A Drug Era is not the same
      as a Drug Exposure: Exposures are individual records corresponding to the source
      when Drug was delivered to the Person, while successive periods of Drug Exposures
      are combined under certain rules to produce continuous Drug Eras. Every record
      in the DRUG_EXPOSURE table should be part of a drug era based on the dates of
      exposure.'
    attributes:
      drug_era_id:
        description: A unique identifier for each Drug Era.
        imported_from: drug_era_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      drug_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies belonging to the ''Drug'' domain.
        imported_from: drug_concept_id
        range: integer # doubts
        domain: concept
        identifier: false
        required: true
      drug_era_start_date:
        description: The Drug Era Start Date is the start date of the first Drug Exposure
          for a given ingredient, with at least 31 days since the previous exposure.
        imported_from: drug_era_start_date
        range: date
        identifier: false
        required: true
      drug_era_end_date:
        description: The Drug Era End Date is the end date of the last Drug Exposure.
        imported_from: drug_era_end_date
        range: date
        identifier: false
        required: true
      drug_exposure_count:
        description: The number of individual Drug Exposure occurrences used to construct
          the Drug Era.
        imported_from: drug_exposure_count
        range: integer
        identifier: false
        required: false
      gap_days:
        description: The number of days that are not covered by DRUG_EXPOSURE records
          that were used to make up the era record.
        imported_from: gap_days
        range: integer
        identifier: false
        required: false
  dose_era:
    description: A Dose Era is defined as a span of time when the Person is assumed
      to be exposed to a constant dose of a specific active ingredient.
    attributes:
      dose_era_id:
        description: A unique identifier for each Dose Era.
        imported_from: dose_era_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      drug_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies belonging to the ''Drug'' domain.
        imported_from: drug_concept_id
        range: integer #doubts
        domain: concept
        identifier: false
        required: true
      unit_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies for the unit concept.
        imported_from: unit_concept_id
        range: integer # doubts
        domain: concept
        identifier: false
        required: true
      dose_value:
        description: The numeric value of the dose.
        imported_from: dose_value
        range: float
        identifier: false
        required: true
      dose_era_start_date:
        description: The date the Person started on the specific dosage, with at least
          31 days since any prior exposure.
        imported_from: dose_era_start_date
        range: date
        identifier: false
        required: true
      dose_era_end_date:
        description: The date the Person was no longer exposed to the dosage of the
          specific drug ingredient. An era is ended if there are 31 days or more between
          dosage records.
        imported_from: dose_era_end_date
        range: date
        identifier: false
        required: true
  condition_era:
    description: A Condition Era is defined as a span of time when the Person is assumed
      to have a given condition. Similar to Drug Eras, Condition Eras are chronological
      periods of Condition Occurrence and every Condition Occurrence record should
      be part of a Condition Era.
    attributes:
      condition_era_id:
        description: A unique identifier for each Condition Era.
        imported_from: condition_era_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      condition_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies belonging to the ''Condition'' domain.
        imported_from: condition_concept_id
        range: condition_occurrence
        identifier: false
        required: true
      condition_era_start_date:
        description: The start date for the Condition Era constructed from the individual
          instances of Condition Occurrences. It is the start date of the very first
          chronologically recorded instance of the condition with at least 31 days
          since any prior record of the same Condition.
        imported_from: condition_era_start_date
        range: date
        identifier: false
        required: true
      condition_era_end_date:
        description: The end date for the Condition Era constructed from the individual
          instances of Condition Occurrences. It is the end date of the final continuously
          recorded instance of the Condition
        imported_from: condition_era_end_date
        range: date
        identifier: false
        required: true
      condition_occurrence_count:
        description: The number of individual Condition Occurrences used to construct
          the condition era.
        imported_from: condition_occurrence_count
        range: integer
        identifier: false
        required: false
  episode:
    description: The EPISODE table aggregates lower-level clinical events (VISIT_OCCURRENCE,
      DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, DEVICE_EXPOSURE) into a higher-level abstraction
      representing clinically and analytically relevant disease phases,outcomes and
      treatments. The EPISODE_EVENT table connects qualifying clinical events (VISIT_OCCURRENCE,
      DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, DEVICE_EXPOSURE) to the appropriate EPISODE
      entry. For example cancers including their development over time, their treatment,
      and final resolution.
    attributes:
      episode_id:
        description: A unique identifier for each Episode.
        imported_from: episode_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      episode_concept_id:
        description: The EPISODE_CONCEPT_ID represents the kind abstraction related
          to the disease phase, outcome or treatment.
        imported_from: episode_concept_id
        range: integer
        bindings:
          - range: omop_episode_values
        domain: concept
        identifier: false
        required: true
      episode_start_date:
        description: The date when the Episode beings.
        imported_from: episode_start_date
        range: date
        identifier: false
        required: true
      episode_start_datetime:
        description: The date and time when the Episode begins.
        imported_from: episode_start_datetime
        range: datetime
        identifier: false
        required: false
      episode_end_date:
        description: The date when the instance of the Episode is considered to have
          ended.
        imported_from: episode_end_date
        range: date
        identifier: false
        required: false
      episode_end_datetime:
        description: The date when the instance of the Episode is considered to have
          ended.
        imported_from: episode_end_datetime
        range: datetime
        identifier: false
        required: false
      episode_parent_id:
        description: Use this field to find the Episode that subsumes the given Episode
          record. This is used in the case that an Episode are nested into each other.
        imported_from: episode_parent_id
        range: integer
        identifier: false
        required: false
      episode_number:
        description: For sequences of episodes, this is used to indicate the order
          the episodes occurred. For example, lines of treatment could be indicated
          here.
        imported_from: episode_number
        range: integer
        identifier: false
        required: false
      episode_object_concept_id:
        description: A Standard Concept representing the disease phase, outcome, or
          other abstraction of which the episode consists.
        imported_from: episode_object_concept_id
        range: integer # doubts
        domain: concept
        identifier: false
        required: true
      episode_type_concept_id:
        description: This field can be used to determine the provenance of the Episode
          record, as in whether the episode was from an EHR system, insurance claim,
          registry, or other sources.
        imported_from: episode_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      episode_source_value:
        description: The source code for the Episode as it appears in the source data.
          This code is mapped to a Standard Condition Concept in the Standardized
          Vocabularies and the original code is stored here for reference.
        imported_from: episode_source_value
        range: string
        identifier: false
        required: false
      episode_source_concept_id:
        description: A foreign key to a Episode Concept that refers to the code used
          in the source.
        imported_from: episode_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
  episode_event:
    description: The EPISODE_EVENT table connects qualifying clinical events (such
      as CONDITION_OCCURRENCE, DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, MEASUREMENT) to
      the appropriate EPISODE entry. For example, linking the precise location of
      the metastasis (cancer modifier in MEASUREMENT) to the disease episode.
    attributes:
      episode_id:
        description: A unique identifier for each Episode.
        imported_from: episode_id
        range: integer
        domain: episode
        identifier: false
        required: true  
      event_id:
        description: This field is the primary key of the linked record in the database.
        imported_from: event_id
        range: integer
        identifier: false
        required: true
      episode_event_field_concept_id:
        description: This field is the CONCEPT_ID that identifies which table the
          primary key of the linked record came from.
        imported_from: episode_event_field_concept_id
        range: integer
        bindings:
          - range: omop_metadata_values
        domain: concept
        identifier: false
        required: true
  metadata:
    description: The METADATA table contains metadata information about a dataset
      that has been transformed to the OMOP Common Data Model.
    attributes:
      metadata_id:
        description: The unique key given to a Metadata record.
        imported_from: metadata_id
        range: integer
        identifier: true
        required: true
      metadata_concept_id:
        description: OMOP Vocabulary CONCEPT_ID that identifies the information you
          with to track (e.g. 8 for metadata about a Visit)
        imported_from: metadata_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true
      metadata_type_concept_id:
        description: OMOP Vocabulary CONCEPT_ID that identifies the type information
          you with to track (e.g. 1 for metadata about Domains such as a Visit)
        imported_from: metadata_type_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true
      name:
        description: Name of the CONCEPT_ID stored in METADATA_CONCEPT_ID or in the
          event there is not an applicable CONCEPT_ID NAME can be used to represent
          the data stored (e.g. CDM_BUILDER VERSION)
        imported_from: name
        range: string
        identifier: false
        required: true
      value_as_string:
        description: The observation result stored as a string. This is applicable
          to observations where the result is expressed as verbatim text.
        imported_from: value_as_string
        range: string
        identifier: false
        required: false
      value_as_concept_id:
        description: A foreign key to an observation result stored as a Concept ID.
          This is applicable to observations where the result can be expressed as
          a Standard Concept from the Standardized Vocabularies (e.g., positive/negative,
          present/absent, low/high, etc.).
        imported_from: value_as_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      value_as_number:
        description: The observation result stored as a number. This is applicable
          to observations where the result is expressed as a numeric value.
        imported_from: value_as_number
        range: float
        identifier: false
        required: false
      metadata_date:
        description: The date associated with metadata
        imported_from: metadata_date
        range: date
        identifier: false
        required: false
      metadata_datetime:
        description: The date and time associated with metadata
        imported_from: metadata_datetime
        range: datetime
        identifier: false
        required: false
  cdm_source:
    description: The CDM_SOURCE table contains detail about the source database and
      the process used to transform the data into the OMOP Common Data Model.
    attributes:
      cdm_source_name:
        description: The full name of the source
        imported_from: cdm_source_name
        range: string
        identifier: false
        required: true
      cdm_source_abbreviation:
        description: An abbreviation of the name
        imported_from: cdm_source_abbreviation
        range: string
        identifier: false
        required: true
      cdm_holder:
        description: The name of the organization responsible for the development
          of the CDM instance.
        imported_from: cdm_holder
        range: string
        identifier: false
        required: true
      source_description:
        description: A description of the source data origin and purpose for collection.
          The description may contain a summary of the period of time that is expected
          to be covered by this dataset.
        imported_from: source_description
        range: string
        identifier: false
        required: false
      source_documentation_reference:
        description: URL or other external reference to location of source documentation
        imported_from: source_documentation_reference
        range: string
        identifier: false
        required: false
      cdm_etl_reference:
        description: URL or other external reference to location of ETL specification
          documentation and ETL source code
        imported_from: cdm_etl_reference
        range: string
        identifier: false
        required: false
      source_release_date:
        description: The date for which the source data are most current, such as
          the last day of data capture
        imported_from: source_release_date
        range: date
        identifier: false
        required: true
      cdm_release_date:
        description: The date when the CDM was instantiated
        imported_from: cdm_release_date
        range: date
        identifier: false
        required: true
      cdm_version:
        description: The version of CDM used
        imported_from: cdm_version
        range: string
        identifier: false
        required: false
      cdm_version_concept_id:
        description: The Concept Id representing the version of the CDM.
        imported_from: cdm_version_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true
      vocabulary_version:
        description: Version of the OMOP standardised vocabularies loaded.
        imported_from: vocabulary_version
        range: string
        identifier: false
        required: true   
  cohort:
    description: The subject of a cohort can have multiple, discrete records in the
      cohort table per cohort_definition_id, subject_id, and non-overlapping time
      periods. The definition of the cohort is contained within the COHORT_DEFINITION
      table. It is listed as part of the RESULTS schema because it is a table that
      users of the database as well as tools such as ATLAS need to be able to write
      to. The CDM and Vocabulary tables are all read-only so it is suggested that
      the COHORT and COHORT_DEFINTION tables are kept in a separate schema to alleviate
      confusion.
    attributes:
      cohort_definition_id:
        description: A foreign key to a record in the COHORT_DEFINITION table containing
          relevant Cohort Definition information. This is the identifier given to
          the cohort, usually by the ATLAS application.
        imported_from: cohort_definition_id
        range: integer
        identifier: false
        required: true
      subject_id:
        description: A foreign key to the subject in the cohort. These could be referring
          to records in the PERSON, PROVIDER, VISIT_OCCURRENCE table.
        imported_from: subject_id
        range: integer
        identifier: false
        required: true
      cohort_start_date:
        description: The date when the Cohort Definition criteria for the Person,
          Provider or Visit first match.
        imported_from: cohort_start_date
        range: date
        identifier: false
        required: true
      cohort_end_date:
        description: The date when the Cohort Definition criteria for the Person,
          Provider or Visit no longer match or the Cohort membership was terminated.
        imported_from: cohort_end_date
        range: date
        identifier: false
        required: true
  cohort_definition:
    description: The COHORT_DEFINITION table contains records defining a Cohort derived
      from the data through the associated description and syntax and upon instantiation
      (execution of the algorithm) placed into the COHORT table. Cohorts are a set
      of subjects that satisfy a given combination of inclusion criteria for a duration
      of time. The COHORT_DEFINITION table provides a standardized structure for maintaining
      the rules governing the inclusion of a subject into a cohort, and can store
      operational programming code to instantiate the cohort within the OMOP Common
      Data Model.
    attributes:
      cohort_definition_id:
        description: A foreign key to a record in the COHORT_DEFINITION table containing
          relevant Cohort Definition information. This is the identifier given to
          the cohort, usually by the ATLAS application.
        imported_from: cohort_definition_id
        range: integer
        identifier: false
        required: true
      cohort_definition_name:
        description: A short description of the cohort.
        imported_from: cohort_definition_name
        range: string
        identifier: false
        required: true
      cohort_definition_description:
        description: A complete description of the cohort.
        imported_from: cohort_definition_description
        range: string
        identifier: false
        required: false
      definition_type_concept_id:
        description: Type defining what kind of Cohort Definition the record represents
          and how the syntax may be executed.
        imported_from: definition_type_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true
      cohort_definition_syntax:
        description: Syntax or code to operationalize the Cohort Definition.
        imported_from: cohort_definition_syntax
        range: string
        identifier: false
        required: false
      subject_concept_id:
        description: This field contains a Concept that represents the domain of the
          subjects that are members of the cohort (e.g., Person, Provider, Visit).
        imported_from: subject_concept_id
        range: integer
        domain: concept
        identifier: false
        required: true
      cohort_initiation_date:
        description: A date to indicate when the Cohort was initiated in the COHORT
          table.
        imported_from: cohort_initiation_date
        range: date
        identifier: false
        required: false