        imported_from: measurement_date
        range: date
        identifier: false
        required: true
      measurement_datetime:
        description: The date and time of the Measurement. Some database systems don''t
          have a datatype of time. To accommodate all temporal analyses, datatype
          datetime can be used (combining measurement_date and measurement_time [forum
          discussion](http://forums.ohdsi.org/t/date-time-and-datetime-problem-and-the-world-of-hours-and-1day/314))
        imported_from: measurement_datetime
        range: datetime
        identifier: false
        required: false
