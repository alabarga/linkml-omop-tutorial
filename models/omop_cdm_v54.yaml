  death:
    description: 'The death domain contains the clinical event for how and when a
      Person dies. A person can have up to one record if the source system contains
      evidence about the Death, such as: Condition in an administrative claim, status
      of enrollment into a health plan, or explicit record in EHR data.'
    attributes:
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      death_date:
        description: The date of death of the person.
        imported_from: death_date
        range: date
        identifier: false
        required: true
      death_datetime:
        description: The date and time of death of the person.
        imported_from: death_datetime
        range: datetime
        identifier: false
        required: false
      death_type_concept_id:
        description: This is the provenance of the death record, i.e., where it came
          from. It is possible that an administrative claims database would source
          death information from a government file so do not assume the Death Type
          is the same as the Visit Type, etc.
        imported_from: death_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: false
      cause_concept_id:
        description: "This is the Standard Concept representing the Person's \
          \ cause of death, if available."
        imported_from: cause_concept_id
        range: integer # There is no specified domain for this concept
        domain: concept
        identifier: false
        required: false
      cause_source_value:
        description: If available, put the source code representing the cause of death
          here.
        imported_from: cause_source_value
        range: string
        identifier: false
        required: false
      cause_source_concept_id:
        description: If the cause of death was coded using a Vocabulary present in
          the OMOP Vocabularies (not necessarily a standard concept) put the CONCEPT_ID
          representing the cause of death here.
        imported_from: cause_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false  
  note:
    description: The NOTE table captures unstructured information that was recorded
      by a provider about a patient in free text notes on a given date.
    attributes:
      note_id:
        description: A foreign key to the Note table note the term was
        imported_from: note_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      note_date:
        description: The date the note was recorded.
        imported_from: note_date
        range: date
        identifier: false
        required: true
      note_datetime:
        description: The date and time the note was recorded.
        imported_from: note_datetime
        range: datetime
        identifier: false
        required: false
      note_type_concept_id:
        description: A foreign key to the predefined Concept in the Standardized Vocabularies
          reflecting the type, origin or provenance of the Note. These belong to the
          'Note Type' vocabulary
