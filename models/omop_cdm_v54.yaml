        imported_from: note_class_concept_id
        range: omop_meas_value # https://athena.ohdsi.org/search-terms/terms?standardConcept=Standard&conceptClass=Doc+Kind&conceptClass=Doc+Role&conceptClass=Doc+Setting&conceptClass=Doc+Subject+Matter&conceptClass=Doc+Type+of+Service&domain=Meas+Value&page=1&pageSize=15&query=
        domain: concept
        identifier: false
        required: true
      note_title:
        description: The title of the Note as it appears in the source.
        imported_from: note_title
        range: string
        identifier: false
        required: false
      note_text:
        description: The content of the Note.
        imported_from: note_text
        range: string
        identifier: false
        required: true
      encoding_concept_id:
        description: A foreign key to the predefined Concept in the Standardized Vocabularies
          reflecting the note character encoding type
        imported_from: encoding_concept_id
        range: encoding_values
        domain: concept
        identifier: false
        required: true
      language_concept_id:
        description: A foreign key to the predefined Concept in the Standardized Vocabularies
          reflecting the language of the note
        imported_from: language_concept_id
        range: integer # Use Concepts that are descendants of the concept 4182347
        domain: concept
        identifier: false
        required: true
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
