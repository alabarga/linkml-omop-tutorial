id: omop_cdm_v54
name: omop_cdm_v54
description: A schema representing the OMOP CDM v5.4
prefixes:
  linkml: https://w3id.org/linkml/
  omop_cdm: https://w3id.org/omop_cdm
  omop: https://athena.ohdsi.org/search-terms/terms/
default_prefix: omop_cdm
imports:
- linkml:types
- omop_vocabulary
default_range: integer

enums:
  omop_gender_values:
    reachable_from:      
      source_ontology: omop:Gender
  omop_race_values:
    reachable_from:      
      source_ontology: omop:Race
  omop_ethnicity_values:
    reachable_from:      
      source_ontology: omop:Ethnicity
  omop_visit_values:
    reachable_from:      
      source_ontology: omop:Visit
  omop_type_concept_values:
    reachable_from:      
      source_ontology: omop:TypeConcept
  omop_condition_values:
    reachable_from:      
      source_ontology: omop:Condition
  omop_condition_status_values:
    reachable_from:      
      source_ontology: omop:ConditionStatus
  omop_drug_values:
    reachable_from:      
      source_ontology: omop:Drug
  omop_route_values:
    reachable_from:      
      source_ontology: omop:Route
  omop_procedure_values:
    reachable_from:      
      source_ontology: omop:Procedure
  omop_modifier_values:
    reachable_from:      
      source_ontology: omop:Modifier 
      # There is no domain called modifier, 
      # it should refer to CPT4 and HCPCS vocabularies
      # but the modifier class
      # https://athena.ohdsi.org/search-terms/terms?conceptClass=CPT4+Modifier&conceptClass=HCPCS+Modifier&vocabulary=CPT4&vocabulary=HCPCS&standardConcept=Standard&page=1&pageSize=15&query=
  omop_device_values:
    reachable_from:      
      source_ontology: omop:Device 
      # There are no accepted terms in the documentation, but there is a domain called Device
  omop_measurement_values:
    reachable_from:      
      source_ontology: omop:Measurement 
      # There are no accepted terms in the documentation, 
      # but there is a domain called Measurement, 
      # should we specify LOINC?
  omop_meas_value_operator_values:
    reachable_from:      
      source_ontology: omop:MeasValueOperator
  omop_meas_value:
    reachable_from:      
      source_ontology: omop:MeasValue 
      # Doubts about this enum, https://athena.ohdsi.org/search-terms/terms?standardConcept=Standard&conceptClass=Doc+Kind&conceptClass=Doc+Role&conceptClass=Doc+Setting&conceptClass=Doc+Subject+Matter&conceptClass=Doc+Type+of+Service&domain=Meas+Value&page=1&pageSize=15&query=
  omop_specimen_values:
    reachable_from:      
      source_ontology: omop:Specimen
  omop_unit_values:
    reachable_from:      
      source_ontology: omop:Unit 
      # It is a domain, should we specify UCUM?
  omop_metadata_values:
    reachable_from:      
      source_ontology: omop:Metadata 
      # It is not defined by the domain, 
      # but the class if Field & vocabulary CDM
  omop_geography_values:
    reachable_from:      
      source_ontology: omop:Geography
  omop_episode_values:
    reachable_from:      
      source_ontology: omop:Episode
  omop_provider_values:
    reachable_from:      
      source_ontology: omop:Provider
  omop_payer_values:
    reachable_from:      
      source_ontology: omop:Payer
  omop_plan_values:
    reachable_from:      
      source_ontology: omop:Plan
  omop_plan_stop_reason_values:
    reachable_from:      
      source_ontology: omop:PlanStopReason
  encoding_values:
    permissible_values:
      32678:
        text: 32678
        description: 'UTF-8'
      0:
        text: 0
        description: 'ASCII or any other encoding type'  

classes:
  person:
    description: The Person Domain contains records that uniquely identify each patient
      in the source data who is time at-risk to have clinical observations recordedwithin
      the source systems.
    attributes:
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        identifier: true
        required: true
      gender_concept_id:
        description: A foreign key that refers to an identifier in the CONCEPT table
          for the unique gender of the person.
        imported_from: gender_concept_id
        range: integer
        bindings:
          - range: omop_gender_values
        domain: concept
        identifier: false
        required: true
      year_of_birth:
        description: The year of birth of the person. For data sources with date of
          birth, the year is extracted. For data sources where the year of birth is
          not available, the approximate year of birth is derived based on any age
          group categorization available.
        imported_from: year_of_birth
        range: integer
        identifier: false
        required: true
      month_of_birth:
        description: The month of birth of the person. For data sources that provide
          the precise date of birth, the month is extracted and stored in this field.
        imported_from: month_of_birth
        range: integer
        identifier: false
        required: false
      day_of_birth:
        description: The day of the month of birth of the person. For data sources
          that provide the precise date of birth, the day is extracted and stored
          in this field.
        imported_from: day_of_birth
        range: integer
        identifier: false
        required: false
      birth_datetime:
        description: The date and time of birth of the person.
        imported_from: birth_datetime
        range: datetime
        identifier: false
        required: false
      race_concept_id:
        description: A foreign key that refers to an identifier in the CONCEPT table
          for the unique race of the person, belonging to the ''Race'' vocabulary.
        imported_from: race_concept_id
        range: integer
        bindings:
          - range: omop_race_values
        domain: concept
        identifier: false
        required: true
      ethnicity_concept_id:
        description: A foreign key that refers to the standard concept identifier
          in the Standardized Vocabularies for the ethnicity of the person, belonging
          to the ''Ethnicity'' vocabulary.
        imported_from: ethnicity_concept_id
        range: integer
        bindings:
          - range: omop_ethnicity_values
        domain: concept
        identifier: false
        required: true
      location_id:
        description: A foreign key to the place of residency for the person in the
          location table, where the detailed address information is stored.
        imported_from: location_id
        range: integer
        domain: location
        identifier: false
        required: false
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      care_site_id:
        description: A foreign key to the site of primary care in the care_site table,
          where the details of the care site are stored.
        imported_from: care_site_id
        range: integer
        domain: care_site
        identifier: false
        required: false
      person_source_value:
        description: An (encrypted) key derived from the person identifier in the
          source data. This is necessary when a use case requires a link back to the
          person data at the source dataset.
        imported_from: person_source_value
        range: string
        identifier: false
        required: false
      gender_source_value:
        description: "The source code for the gender of the person as it appears in\
          \ the source data. The person's gender is mapped to a standard gender\
          \ concept in the Standardized Vocabularies; the original value is stored\
          \ here for reference."
        imported_from: gender_source_value
        range: string
        identifier: false
        required: false
      gender_source_concept_id:
        description: A foreign key to the gender concept that refers to the code used
          in the source.
        imported_from: gender_source_concept_id
        range: integer
        domain: concept 
        identifier: false
        required: false
      race_source_value:
        description: The source code for the race of the person as it appears in the
          source data. The person race is mapped to a standard race concept in the
          Standardized Vocabularies and the original value is stored here for reference.
        imported_from: race_source_value
        range: string
        identifier: false
        required: false
      race_source_concept_id:
        description: A foreign key to the race concept that refers to the code used
          in the source.
        imported_from: race_source_concept_id
        range: integer
        domain: concept 
        identifier: false
        required: false
      ethnicity_source_value:
        description: The source code for the ethnicity of the person as it appears
          in the source data. The person ethnicity is mapped to a standard ethnicity
          concept in the Standardized Vocabularies and the original code is, stored
          here for reference.
        imported_from: ethnicity_source_value
        range: string
        identifier: false
        required: false
      ethnicity_source_concept_id:
        description: A foreign key to the ethnicity concept that refers to the code
          used in the source.
        imported_from: ethnicity_source_concept_id
        range: integer
        domain: concept 
        identifier: false
        required: false
  observation_period:
    description: The OBSERVATION_PERIOD table contains records which uniquely define
      the spans of time for which a Person is at-risk to have clinical events recorded
      within the source systems, even if no events in fact are recorded (healthy patient
      with no healthcare interactions).
    attributes:
      observation_period_id:
        description: A unique identifier for each observation period.
        imported_from: observation_period_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      observation_period_start_date:
        description: The start date of the observation period for which data are available
          from the data source.
        imported_from: observation_period_start_date
        range: date
        identifier: false
        required: true
      observation_period_end_date:
        description: The end date of the observation period for which data are available
          from the data source.
        imported_from: observation_period_end_date
        range: date
        identifier: false
        required: true
      period_type_concept_id:
        description: A foreign key identifier to the predefined concept in the Standardized
          Vocabularies reflecting the source of the observation period information,
          belonging to the ''Obs Period Type'' vocabulary.
        imported_from: period_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
  visit_occurrence:
    description: 'The VISIT_OCCURRENCE table contains the spans of time a Person continuously
      receives medical services from one or more providers at a Care Site in a given
      setting within the health care system. Visits are classified into 4 settings:
      outpatient care, inpatient confinement, emergency room, and long-term care.
      Persons may transition between these settings over the course of an episode
      of care (for example, treatment of a disease onset).'
    attributes:
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
          which the Condition was determined (diagnosed).
        imported_from: visit_occurrence_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      visit_concept_id:
        description: A foreign key that refers to a visit Concept identifier in the
          Standardized Vocabularies belonging to the ''Visit'' Vocabulary.
        imported_from: visit_concept_id
        range: integer
        bindings:
          - range: omop_visit_values
        domain: concept
        identifier: false
        required: true
      visit_start_date:
        description: The start date of the visit.
        imported_from: visit_start_date
        range: date
        identifier: false
        required: true
      visit_start_datetime:
        description: The date and time of the visit started.
        imported_from: visit_start_datetime
        range: datetime
        identifier: false
        required: false
      visit_end_date:
        description: The end date of the visit. If this is a one-day visit the end
          date should match the start date.
        imported_from: visit_end_date
        range: date
        identifier: false
        required: true
      visit_end_datetime:
        description: The date and time of the visit end.
        imported_from: visit_end_datetime
        range: datetime
        identifier: false
        required: false
      visit_type_concept_id:
        description: A foreign key to the predefined Concept identifier in the Standardized
          Vocabularies reflecting the type of source data from which the visit record
          is derived belonging to the ''Visit Type'' vocabulary.
        imported_from: visit_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      care_site_id:
        description: A foreign key to the site of primary care in the care_site table,
          where the details of the care site are stored.
        imported_from: care_site_id
        range: integer
        domain: care_site
        identifier: false
        required: false
      visit_source_value:
        description: The source code for the visit as it appears in the source data.
        imported_from: visit_source_value
        range: string
        identifier: false
        required: false
      visit_source_concept_id:
        description: A foreign key to a Concept that refers to the code used in the
          source.
        imported_from: visit_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      admitted_from_concept_id:
        description: A foreign key to the predefined concept in the Place of Service
          Vocabulary reflecting where the patient was admitted from.
        imported_from: admitted_from_concept_id
        range: integer
        bindings:
          - range: omop_visit_values
        domain: concept
        identifier: false
        required: false
      admitted_from_source_value:
        description: The source code for where the patient was admitted from as it
          appears in the source data.
        imported_from: admitted_from_source_value
        range: string
        identifier: false
        required: false
      discharged_to_concept_id:
        description: A foreign key to the predefined concept in the Place of Service
          Vocabulary reflecting the discharge disposition for a visit.
        imported_from: discharged_to_concept_id
        range: integer
        bindings:
          - range: omop_visit_values
        domain: concept
        identifier: false
        required: false
      discharged_to_source_value:
        description: The source code for the discharge disposition as it appears in
          the source data.
        imported_from: discharged_to_source_value
        range: string
        identifier: false
        required: false
      preceding_visit_occurrence_id:
        description: A foreign key to the VISIT_OCCURRENCE table of the visit immediately
          preceding this visit.
        imported_from: preceding_visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
  visit_detail:
    description: The VISIT_DETAIL table is an optional table used to represents details
      of each record in the parent visit_occurrence table. For every record in visit_occurrence
      table there may be 0 or more records in the visit_detail table with a 1:n relationship
      where n may be 0. The visit_detail table is structurally very similar to visit_occurrence
      table and belongs to the similar domain as the visit.
    attributes:
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      visit_detail_concept_id:
        description: A foreign key that refers to a visit Concept identifier in the
          Standardized Vocabularies belonging to the 'Visit' Vocabulary.
        imported_from: visit_detail_concept_id
        range: integer
        bindings:
          - range: omop_visit_values
        domain: concept
        identifier: false
        required: true
      visit_detail_start_date:
        description: The start date of the visit.
        imported_from: visit_detail_start_date
        range: date
        identifier: false
        required: true
      visit_detail_start_datetime:
        description: The date and time of the visit started.
        imported_from: visit_detail_start_datetime
        range: datetime
        identifier: false
        required: false
      visit_detail_end_date:
        description: The end date of the visit. If this is a one-day visit the end
          date should match the start date.
        imported_from: visit_detail_end_date
        range: date
        identifier: false
        required: true
      visit_detail_end_datetime:
        description: The date and time of the visit end.
        imported_from: visit_detail_end_datetime
        range: datetime
        identifier: false
        required: false
      visit_detail_type_concept_id:
        description: A foreign key to the predefined Concept identifier in the Standardized
          Vocabularies reflecting the type of source data from which the visit record
          is derived belonging to the ''Visit Type'' vocabulary.
        imported_from: visit_detail_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      care_site_id:
        description: A foreign key to the site of primary care in the care_site table,
          where the details of the care site are stored.
        imported_from: care_site_id
        range: integer
        domain: care_site
        identifier: false
        required: false
      visit_detail_source_value:
        description: The source code for the visit as it appears in the source data.
        imported_from: visit_detail_source_value
        range: string
        identifier: false
        required: false
      visit_detail_source_concept_id:
        description: A foreign key to a Concept that refers to the code used in the
          source.
        imported_from: visit_detail_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      admitted_from_concept_id:
        description: A foreign key to the predefined concept in the Place of Service
          Vocabulary reflecting where the patient was admitted from.
        imported_from: admitted_from_concept_id
        range: integer
        bindings:
          - range: omop_visit_values
        domain: concept
        identifier: false
        required: false
      admitted_from_source_value:
        description: The source code for where the patient was admitted from as it
          appears in the source data.
        imported_from: admitted_from_source_value
        range: string
        identifier: false
        required: false
      discharged_to_source_value:
        description: The source code for the discharge disposition as it appears in
          the source data.
        imported_from: discharged_to_source_value
        range: string
        identifier: false
        required: false
      discharged_to_concept_id:
        description: A foreign key to the predefined concept in the Place of Service
          Vocabulary reflecting the discharge disposition for a visit.
        imported_from: discharged_to_concept_id
        range: integer
        bindings:
          - range: omop_visit_values
        domain: concept
        identifier: false
        required: false
      preceding_visit_detail_id:
        description: A foreign key to the VISIT_DETAIL table of the visit immediately
          preceding this visit.
        imported_from: preceding_visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      parent_visit_detail_id:
        description: Use this field to find the visit detail that subsumes the given
          visit detail record. This is used in the case that a visit detail record
          needs to be nested beyond the VISIT_OCCURRENCE/VISIT_DETAIL relationship.
        imported_from: parent_visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
          which the Condition was determined (diagnosed).
        imported_from: visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: true
  condition_occurrence:
    description: 'Conditions are records of a Person suggesting the presence of a
      disease or medical condition stated as a diagnosis, a sign, or a symptom, which
      is either observed by a Provider or reported by the patient. Conditions are
      recorded in different sources and levels of standardization, for example: *
      Medical claims data include diagnoses coded in Source Vocabularies such as ICD-9-CM
      that are submitted as part of a reimbursement claim for health services * EHRs
      may capture Person conditions in the form of diagnosis codes or symptoms'
    attributes:
      condition_occurrence_id:
        description: A unique identifier for each Condition Occurrence event.
        imported_from: condition_occurrence_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      condition_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies belonging to the ''Condition'' domain.
        imported_from: condition_concept_id
        range: integer
        bindings:
          - range: omop_condition_values
        domain: concept
        identifier: false
        required: true
      condition_start_date:
        description: The date when the instance of the Condition is recorded.
        imported_from: condition_start_date
        range: date
        identifier: false
        required: true
      condition_start_datetime:
        description: The date and time when the instance of the Condition is recorded.
        imported_from: condition_start_datetime
        range: datetime
        identifier: false
        required: false
      condition_end_date:
        description: The date when the instance of the Condition is considered to
          have ended.
        imported_from: condition_end_date
        range: date
        identifier: false
        required: false
      condition_end_datetime:
        description: The date and timewhen the instance of the Condition is considered
          to have ended.
        imported_from: condition_end_datetime
        range: datetime
        identifier: false
        required: false
      condition_type_concept_id:
        description: A foreign key to the predefined Concept identifier in the Standardized
          Vocabularies reflecting the source data from which the Condition was recorded,
          the level of standardization, and the type of occurrence. These belong to
          the ''Condition Type'' vocabulary.
        imported_from: condition_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      condition_status_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies reflecting the point of care at which the
          Condition was diagnosed.
        imported_from: condition_status_concept_id
        range: integer
        bindings:
          - range: omop_condition_status_values
        domain: concept
        identifier: false
        required: false
      stop_reason:
        description: The reason that the Condition was no longer present, as indicated
          in the source data.
        imported_from: stop_reason
        range: string
        identifier: false
        required: false
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
          which the Condition was determined (diagnosed).
        imported_from: visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      condition_source_value:
        description: The source code for the Condition as it appears in the source
          data. This code is mapped to a Standard Condition Concept in the Standardized
          Vocabularies and the original code is stored here for reference.
        imported_from: condition_source_value
        range: string
        identifier: false
        required: false
      condition_source_concept_id:
        description: A foreign key to a Condition Concept that refers to the code
          used in the source.
        imported_from: condition_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      condition_status_source_value:
        description: The source code for the condition status as it appears in the
          source data.  This code is mapped to a Standard Concept in the Standardized
          Vocabularies and the original code is stored here for reference.
        imported_from: condition_status_source_value
        range: string
        identifier: false
        required: false
  drug_exposure:
    description: 'The Drug domain captures records about the utilization of a Drug
      when ingested or otherwise introduced into the body. A Drug is a biochemical
      substance formulated in such a way that when administered to a Person it will
      exert a certain physiological effect. Drugs include prescription and over-the-counter
      medicines, vaccines, and large-molecule biologic therapies. Radiological devices
      ingested or applied locally do not count as Drugs. Drug Exposure is inferred
      from clinical events associated with orders, prescriptions written, pharmacy
      dispensings, procedural administrations, and other patient-reported information,
      for example: * The Prescription section of an EHR captures prescriptions written
      by physicians or from electronic ordering systems * The Medication list section
      of an EHR for both non-prescription products and medications prescribed by other
      providers * Prescriptions filled at dispensing providers such as pharmacies,
      and then captured in reimbursement claim systems * Drugs administered as part
      of a Procedure, such as chemotherapy or vaccines.'
    attributes:
      drug_exposure_id:
        description: A system-generated unique identifier for each Drug utilization
          event.
        imported_from: drug_exposure_id
        range: integer
        identifier: true
        required: true 
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      drug_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies belonging to the ''Drug'' domain.
        imported_from: drug_concept_id
        range: integer
        bindings:
          - range: omop_drug_values
        domain: concept
        identifier: false
        required: true
      drug_exposure_start_date:
        description: The start date for the current instance of Drug utilization.
          Valid entries include a start date of a prescription, the date a prescription
          was filled, or the date on which a Drug administration procedure was recorded.
        imported_from: drug_exposure_start_date
        range: date
        identifier: false
        required: true
      drug_exposure_start_datetime:
        description: The start date and time for the current instance of Drug utilization.
          Valid entries include a start datetime of a prescription, the date and time
          a prescription was filled, or the date and time on which a Drug administration
          procedure was recorded.
        imported_from: drug_exposure_start_datetime
        range: datetime
        identifier: false
        required: false
      drug_exposure_end_date:
        description: The end date for the current instance of Drug utilization. Depending
          on different sources, it could be a known or an inferred date and denotes
          the last day at which the patient was still exposed to Drug.
        imported_from: drug_exposure_end_date
        range: date
        identifier: false
        required: true
      drug_exposure_end_datetime:
        description: The end date and time for the current instance of Drug utilization.
          Depending on different sources, it could be a known or an inferred date
          and time and denotes the last day at which the patient was still exposed
          to Drug.
        imported_from: drug_exposure_end_datetime
        range: datetime
        identifier: false
        required: false
      verbatim_end_date:
        description: The known end date of a drug_exposure as provided by the source.
        imported_from: verbatim_end_date
        range: date
        identifier: false
        required: false
      drug_type_concept_id:
        description: A foreign key to the predefined Concept identifier in the Standardized
          Vocabularies reflecting the type of Drug Exposure recorded. It indicates
          how the Drug Exposure was represented in the source data and belongs to
          the 'Drug Type' vocabulary.
        imported_from: drug_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      stop_reason:
        description: The reason that the Condition was no longer present, as indicated
          in the source data.
        imported_from: stop_reason
        range: string
        identifier: false
        required: false
      refills:
        description: The number of refills after the initial prescription. The initial
          prescription is not counted, values start with null.
        imported_from: refills
        range: integer
        identifier: false
        required: false
      quantity:
        description: The quantity of drug as recorded in the original prescription
          or dispensing record.
        imported_from: quantity
        range: float
        identifier: false
        required: false
      days_supply:
        description: The number of days of supply of the medication as prescribed.
          This reflects the intention of the provider for the length of exposure.
        imported_from: days_supply
        range: integer
        identifier: false
        required: false
      sig:
        description: The directions (''signetur'') on the Drug prescription as recorded
          in the original prescription (and printed on the container) or dispensing
          record.
        imported_from: sig
        range: string
        identifier: false
        required: false
      route_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies reflecting the route of administration and
          belonging to the ''Route'' domain.
        imported_from: route_concept_id
        range: integer
        bindings:
          - range: omop_route_values
        domain: concept
        identifier: false
        required: false
      lot_number:
        description: An identifier assigned to a particular quantity or lot of Drug
          product from the manufacturer.
        imported_from: lot_number
        range: string
        identifier: false
        required: false
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
          which the Condition was determined (diagnosed).
        imported_from: visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      drug_source_value:
        description: The source code for the Drug as it appears in the source data.
          This code is mapped to a Standard Drug concept in the Standardized Vocabularies
          and the original code is, stored here for reference.
        imported_from: drug_source_value
        range: string
        identifier: false
        required: false
      drug_source_concept_id:
        description: A foreign key to a Drug Concept that refers to the code used
          in the source.
        imported_from: drug_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      route_source_value:
        description: The information about the route of administration as detailed
          in the source.
        imported_from: route_source_value
        range: string
        identifier: false
        required: false
      dose_unit_source_value:
        description: The information about the dose unit as detailed in the source.
        imported_from: dose_unit_source_value
        range: string
        identifier: false
        required: false
  procedure_occurrence:
    description: 'The PROCEDURE_OCCURRENCE table contains records of activities or
      processes ordered by, or carried out by, a healthcare provider on the patient
      to have a diagnostic or therapeutic purpose. Procedures are present in various
      data sources in different forms with varying levels of standardization. For
      example: * Medical Claims include procedure codes that are submitted as part
      of a claim for health services rendered, including procedures performed. * Electronic
      Health Records that capture procedures as orders.'
    attributes:
      procedure_occurrence_id:
        description: A system-generated unique identifier for each Procedure Occurrence.
        imported_from: procedure_occurrence_id
        range: integer
        identifier: true
        required: true
      person_id:
        description: A unique identifier for each person.
        imported_from: person_id
        range: integer
        domain: person
        identifier: false
        required: true
      procedure_concept_id:
        description: A foreign key that refers to a standard procedure Concept identifier
          in the Standardized Vocabularies.
        imported_from: procedure_concept_id
        range: integer
        bindings:
          - range: omop_procedure_values
        domain: concept
        identifier: false
        required: true
      procedure_date:
        description: The date on which the Procedure was performed.
        imported_from: procedure_date
        range: date
        identifier: false
        required: true
      procedure_datetime:
        description: The date and time on which the Procedure was performed.
        imported_from: procedure_datetime
        range: datetime
        identifier: false
        required: false
      procedure_end_date:
        description: The date the instance of the Procedure is considered to have
          ended.
        imported_from: procedure_end_date
        range: date
        identifier: false
        required: false
      procedure_end_datetime:
        description: The date and timewhen the instance of the Procedure is considered
          to have ended.
        imported_from: procedure_end_datetime
        range: datetime
        identifier: false
        required: false
      procedure_type_concept_id:
        description: A foreign key to the predefined Concept identifier in the Standardized
          Vocabularies reflecting the type of source data from which the procedure
          record is derived, belonging to the ''Procedure Type'' vocabulary.
        imported_from: procedure_type_concept_id
        range: integer
        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      modifier_concept_id:
        description: A foreign key to a Standard Concept identifier for a modifier
          to the Procedure (e.g. bilateral). These concepts are typically distinguished
          by ''Modifier'' concept classes (e.g., ''CPT4 Modifier'' as part of the
          ''CPT4'' vocabulary).
        imported_from: modifier_concept_id
        range: omop_modifier_values # doubts: https://athena.ohdsi.org/search-terms/terms?conceptClass=CPT4+Modifier&conceptClass=HCPCS+Modifier&vocabulary=CPT4&vocabulary=HCPCS&standardConcept=Standard&page=1&pageSize=15&query=
        domain: concept
        identifier: false
        required: false
      quantity:
        description: The quantity of drug as recorded in the original prescription
          or dispensing record.
        imported_from: quantity
        range: float
        identifier: false
        required: false
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false   
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
          which the Condition was determined (diagnosed).
        imported_from: visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      procedure_source_value:
        description: The source code for the Procedure as it appears in the source
          data. This code is mapped to a standard procedure Concept in the Standardized
          Vocabularies and the original code is, stored here for reference. Procedure
          source codes are typically ICD-9-Proc, CPT-4, HCPCS or OPCS-4 codes.
        imported_from: procedure_source_value
        range: string
        identifier: false
        required: false
      procedure_source_concept_id:
        description: A foreign key to a Procedure Concept that refers to the code
          used in the source.
        imported_from: procedure_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      modifier_source_value:
        description: The source code for the qualifier as it appears in the source
          data.
        imported_from: modifier_source_value
        range: string
        identifier: false
        required: false
  device_exposure:
    description: The ''Device'' domain captures information about a person''s exposure
      to a foreign physical object or instrument which is used for diagnostic or therapeutic
      purposes through a mechanism beyond chemical action. Devices include implantable
      objects (e.g. pacemakers, stents, artificial joints), medical equipment and
      supplies (e.g. bandages, crutches, syringes), other instruments used in medical
      procedures (e.g. sutures, defibrillators) and material used in clinical care
      (e.g. adhesives, body material, dental material, surgical material).
