          the OHDSI community, and should only be used when Standard Concepts do not
          adequately represent the source detail for the Measurement necessary for
          a given analytic use case. Consider using UNIT_CONCEPT_ID instead to enable
          standardized analytics that can be consistent across the network
        imported_from: unit_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      value_source_value:
        description: The source value associated with the content of the value_as_number
