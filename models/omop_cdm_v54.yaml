        identifier: false
        required: false
      device_exposure_end_datetime:
        description: The date and time use of the Device or supply was ceased.
        imported_from: device_exposure_end_datetime
        range: datetime
        identifier: false
        required: false
      device_type_concept_id:
        description: A foreign key to the predefined Concept identifier in the Standardized
          Vocabularies reflecting the type of Device Exposure recorded. It indicates
