        imported_from: visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      note_source_value:
        description: The source value associated with the origin of the Note
        imported_from: note_source_value
        range: string
        identifier: false
        required: false
      note_event_id:
        description: A foreign key identifier to the event (e.g. Measurement, Procedure,
