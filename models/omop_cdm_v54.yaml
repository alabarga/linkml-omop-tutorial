        bindings:
          - range: omop_type_concept_values
        domain: concept
        identifier: false
        required: true
      unique_device_id:
        description: A UDI or equivalent identifying the instance of the Device used
          in the Person.
        imported_from: unique_device_id
        range: string
        identifier: false
        required: false
      production_id:
        description: This is the Production Identifier (UDI-PI) portion of the Unique
          Device Identification.
        imported_from: production_id
        range: string
        identifier: false
        required: false
      quantity:
        description: The quantity of drug as recorded in the original prescription
          or dispensing record.
        imported_from: quantity
        range: integer
        identifier: false
        required: false
      provider_id:
        description: A foreign key to the primary care provider the person is seeing
          in the provider table.
        imported_from: provider_id
        range: integer
        domain: provider
        identifier: false
        required: false
      visit_occurrence_id:
        description: A foreign key to the visit in the VISIT_OCCURRENCE table during
          which the Condition was determined (diagnosed).
        imported_from: visit_occurrence_id
        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      device_source_value:
        description: The source code for the Device as it appears in the source data.
          This code is mapped to a Standard Device Concept in the Standardized Vocabularies
          and the original code is stored here for reference.
        imported_from: device_source_value
        range: string
        identifier: false
        required: false
      device_source_concept_id:
        description: A foreign key to a Device Concept that refers to the code used
          in the source.
        imported_from: device_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      unit_concept_id:
        description: A foreign key that refers to a Standard Concept identifier in
          the Standardized Vocabularies for the unit concept.
        imported_from: unit_concept_id
        range: integer # There is no standardization requirement for units associated with DEVICE_CONCEPT_IDs
        domain: concept
        identifier: false
        required: false
      unit_source_value:
        description: The information about the Unit as detailed in the source.
        imported_from: unit_source_value
        range: string
        identifier: false
        required: false
      unit_source_concept_id:
        description: This is the concept representing the UNIT_SOURCE_VALUE and may
          not necessarily be standard. This field is discouraged from use in analysis
          because it is not required to contain Standard Concepts that are used across
          the OHDSI community, and should only be used when Standard Concepts do not
