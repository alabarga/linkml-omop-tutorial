        range: integer
        domain: visit_occurrence
        identifier: false
        required: false
      visit_detail_id:
        description: A unique identifier for each Person''s visit or encounter at
          a healthcare provider.
        imported_from: visit_detail_id
        range: integer
        domain: visit_detail
        identifier: false
        required: false
      measurement_source_value:
        description: The Measurement name as it appears in the source data. This code
          is mapped to a Standard Concept in the Standardized Vocabularies and the
          original code is stored here for reference.
        imported_from: measurement_source_value
        range: string
        identifier: false
        required: false
      measurement_source_concept_id:
        description: A foreign key to a Concept in the Standard Vocabularies that
          refers to the code used in the source.
        imported_from: measurement_source_concept_id
        range: integer
        domain: concept
        identifier: false
        required: false
      unit_source_value:
        description: The information about the Unit as detailed in the source.
        imported_from: unit_source_value
        range: string
        identifier: false
        required: false
      unit_source_concept_id:
        description: This is the concept representing the UNIT_SOURCE_VALUE and may
