        identifier: false
        required: false
      unit_source_value:
        description: The information about the Unit as detailed in the source.
        imported_from: unit_source_value
        range: string
        identifier: false
        required: false
      qualifier_source_value:
        description: The source value associated with a qualifier to characterize
          the observation
        imported_from: qualifier_source_value
        range: string
        identifier: false
        required: false
      value_source_value:
        description: The source value associated with the content of the value_as_number
          or value_as_concept_id as stored in the source data.
        imported_from: value_source_value
        range: string
        identifier: false
        required: false
      observation_event_id:
        description: A foreign key to an event table (e.g., PROCEDURE_OCCURRENCE_ID).
        imported_from: observation_event_id
